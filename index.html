<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Hours Tracker — Demo</title>
    <!-- Tiny SVG favicon (data URI) -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%230b74ff' width='100' height='100'/%3E%3Ctext x='50' y='65' font-size='60' text-anchor='middle' fill='white'%3EH%3C/text%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header" role="banner">
      <div class="container header-inner">
        <h1 id="app-title">Hours Tracker</h1>
        <div class="header-user">
          <span id="current-user" class="muted"></span>
        </div>
        <div class="header-controls">
          <button type="button" id="export-csv" class="btn">Export CSV</button>
          <select
            title="Export range"
            id="export-range"
            aria-label="Export range"
          >
            <option value="all">All</option>
            <option value="today">Today</option>
            <option value="week">Week</option>
            <option value="month">Month</option>
          </select>
          <button type="button" id="login-btn" class="btn">Login</button>
        </div>
      </div>
    </header>

    <main class="container main-grid" role="main">
      <!-- Clock Card -->
      <section
        id="clock-card"
        class="card"
        aria-labelledby="clock-card-heading"
      >
        <h2 id="clock-card-heading" class="sr-only">Clock Control</h2>

        <div class="clock-status" id="clock-status">
          <p id="status-text">
            You are currently <strong id="status-state">clocked out</strong>
          </p>
          <p id="status-since" class="muted"></p>
        </div>

        <div class="clock-actions">
          <button
            type="button"
            id="clock-toggle"
            class="btn btn-primary"
            aria-live="polite"
          >
            Clock In
          </button>
          <input
            id="quick-note"
            type="text"
            placeholder="Add a note (optional)"
            aria-label="Quick note"
          />
          <!-- Project selector added -->
          <select id="project-select" aria-label="Project">
            <option value="proj-default">General</option>
          </select>
        </div>
      </section>

      <!-- Sessions List Card -->
      <section
        id="sessions-card"
        class="card"
        aria-labelledby="sessions-heading"
      >
        <h2 id="sessions-heading">Sessions</h2>
        <table
          id="sessions-table"
          class="sessions-table"
          aria-describedby="sessions-desc"
        >
          <caption id="sessions-desc" class="sr-only">
            List of tracked sessions
          </caption>
          <thead>
            <tr>
              <th>Date</th>
              <th>Start</th>
              <th>End</th>
              <th>Duration</th>
              <th>Project</th>
              <th>Notes</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="sessions-tbody">
            <!-- rows inserted here -->
          </tbody>
        </table>
        <div class="session-controls">
          <button type="button" id="add-entry-btn" class="btn">
            Add Entry
          </button>
        </div>
      </section>
    </main>

    <footer class="container site-footer" role="contentinfo">
      <div id="totals" class="totals">
        <div>Today: <span id="total-today">0h</span></div>
        <div>Week: <span id="total-week">0h</span></div>
        <div>Month: <span id="total-month">0h</span></div>
      </div>
    </footer>

    <div id="modal-root" aria-hidden="true"></div>
    <!-- AUTH MODAL -->
    <div id="auth-modal" class="modal hidden" aria-hidden="true">
      <div
        class="modal-content"
        role="dialog"
        aria-modal="true"
        aria-labelledby="auth-title"
      >
        <h3 id="auth-title">Sign In</h3>
        <form id="auth-form">
          <div class="form-row">
            <label for="auth-username">Username</label>
            <input
              type="text"
              name="username"
              id="auth-username"
              autocomplete="username"
              required
            />
          </div>
          <div class="form-row">
            <label for="auth-password">Password</label>
            <input
              type="password"
              name="password"
              id="auth-password"
              autocomplete="current-password"
              required
            />
          </div>
          <div class="form-row form-actions">
            <button type="submit" id="auth-submit" class="btn btn-primary">
              Sign In
            </button>
            <button type="button" id="auth-toggle" class="btn">Register</button>
            <button type="button" id="auth-close" class="btn">Close</button>
          </div>
        </form>
      </div>
    </div>

    <!-- ENTRY MODAL -->
    <div
      id="entry-modal"
      class="modal hidden"
      aria-hidden="true"
      aria-labelledby="entry-title"
    >
      <div class="modal-content" role="dialog" aria-modal="true">
        <h3 id="entry-title">Add / Edit Entry</h3>
        <form id="entry-form">
          <div class="form-row">
            <label for="entry-start">Start (ISO / local)</label>
            <input
              type="datetime-local"
              id="entry-start"
              name="start"
              required
            />
          </div>
          <div class="form-row">
            <label for="entry-notes">Notes</label>
            <input type="text" id="entry-notes" name="notes" />
          </div>
          <div class="form-row">
            <label for="entry-project">Project</label>
            <select id="entry-project"></select>
          </div>
          <div class="form-row form-actions">
            <button type="submit" id="entry-save" class="btn btn-primary">
              Save
            </button>
            <button type="button" id="entry-cancel" class="btn">Cancel</button>
          </div>
        </form>
      </div>
    </div>
    <script type="module" src="src/app.js"></script>
  </body>
</html>
